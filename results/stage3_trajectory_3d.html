490,26087.2,2876.3,1938.1,16900.4,6004.8,2911.6
491,26149.7,2858.4,1906.6,16932.4,6022.8,2946.1
492,26211.8,2839.4,1876.3,16964.2,6040.5,2980.8
493,26273.6,2819.3,1847.2,16995.7,6058.2,3015.6
494,26335.0,2798.1,1819.4,17026.8,6076.1,3050.4
495,26396.0,2775.9,1792.9,17057.3,6094.3,3085.0
496,26456.5,2752.8,1767.6,17087.4,6112.7,3119.2
497,26516.6,2728.6,1743.6,17117.0,6131.3,3153.0
498,26576.2,2703.4,1720.8,17146.0,6150.3,3186.2
499,26635.3,2677.2,1699.3,17174.5,6169.4,3218.8
`;

const lines = csv.trim().split('\n').slice(1);
const N = lines.length;
const px = new Float64Array(N), py = new Float64Array(N), pz = new Float64Array(N);
const tx = new Float64Array(N), ty = new Float64Array(N), tz = new Float64Array(N);
for (let i = 0; i < N; i++) {
  const p = lines[i].split(',');
  px[i] = +p[1]; py[i] = +p[2]; pz[i] = +p[3];
  tx[i] = +p[4]; ty[i] = +p[5]; tz[i] = +p[6];
}

// Compute min distance
let minDist = Infinity, minIdx = 0;
for (let i = 0; i < N; i++) {
  const d = Math.hypot(px[i]-tx[i], py[i]-ty[i], pz[i]-tz[i]);
  if (d < minDist) { minDist = d; minIdx = i; }
}

const PURSUER = '#f15b4e';   // warm red
const TARGET  = '#4a90d9';   // blue
const GRID    = 'rgba(255,255,255,0.06)';
const TEXT    = '#b0b0b0';

// Persuer trace
const traceP = {
  type: 'scatter3d', mode: 'lines',
  x: py, y: px, z: pz,
  line: { color: PURSUER, width: 2 },
  name: 'Pursuer (P0)',
  hovertemplate: 'P0<br>E:%{x:.0f}m N:%{y:.0f}m Alt:%{z:.0f}m<extra></extra>'
};

// Target trace
const traceT = {
  type: 'scatter3d', mode: 'lines',
  x: ty, y: tx, z: tz,
  line: { color: TARGET, width: 2, dash: 'dot' },
  name: 'Target (T0)',
  hovertemplate: 'T0<br>E:%{x:.0f}m N:%{y:.0f}m Alt:%{z:.0f}m<extra></extra>'
};

// Start/end markers
const traceP_start = {
  type: 'scatter3d', mode: 'markers',
  x: [py[0]], y: [px[0]], z: [pz[0]],
  marker: { color: PURSUER, size: 8, symbol: 'circle' },
  name: 'P0 start', showlegend: false,
  hovertemplate: 'P0 START<br>E:%{x:.0f}m N:%{y:.0f}m<extra></extra>'
};
const traceP_end = {
  type: 'scatter3d', mode: 'markers+text',
  x: [py[N-1]], y: [px[N-1]], z: [pz[N-1]],
  marker: { color: PURSUER, size: 10, symbol: 'diamond' },
  text: ['P0 end'], textposition: 'top center',
  name: 'P0 end', showlegend: false,
  hovertemplate: 'P0 END<br>E:%{x:.0f}m N:%{y:.0f}m<extra></extra>'
};
const traceT_start = {
  type: 'scatter3d', mode: 'markers',
  x: [ty[0]], y: [tx[0]], z: [tz[0]],
  marker: { color: TARGET, size: 8, symbol: 'circle' },
  name: 'T0 start', showlegend: false,
  hovertemplate: 'T0 START<br>E:%{x:.0f}m N:%{y:.0f}m<extra></extra>'
};
const traceT_end = {
  type: 'scatter3d', mode: 'markers+text',
  x: [ty[N-1]], y: [tx[N-1]], z: [tz[N-1]],
  marker: { color: TARGET, size: 10, symbol: 'diamond' },
  text: ['T0 end'], textposition: 'top center',
  name: 'T0 end', showlegend: false,
  hovertemplate: 'T0 END<br>E:%{x:.0f}m N:%{y:.0f}m<extra></extra>'
};

// Closest approach
const traceMin = {
  type: 'scatter3d', mode: 'markers+text',
  x: [py[minIdx], ty[minIdx]],
  y: [px[minIdx], tx[minIdx]],
  z: [pz[minIdx], tz[minIdx]],
  marker: { color: '#f5a623', size: 6, symbol: 'x' },
  name: 'Closest approach',
  text: [`${minDist.toFixed(0)}m`, '']
};

const layout = {
  title: {
    text: `Stage 3 — SinglePursuitTask (difficulty=0.3)<br><span style="font-size:14px;color:#888">Min distance: ${minDist.toFixed(0)}m at step ${minIdx} · ${N} steps (${(N*0.2).toFixed(0)}s)</span>`,
    font: { color: '#e0e0e0', size: 18 }
  },
  scene: {
    xaxis: { title: 'East (m)', color: TEXT, gridcolor: GRID, zerolinecolor: GRID },
    yaxis: { title: 'North (m)', color: TEXT, gridcolor: GRID, zerolinecolor: GRID },
    zaxis: { title: 'Altitude (m)', color: TEXT, gridcolor: GRID, zerolinecolor: GRID },
    bgcolor: '#0f0f0f',
    camera: { eye: { x: 1.8, y: 2.2, z: 0.8 } }
  },
  paper_bgcolor: '#0f0f0f',
  plot_bgcolor: '#0f0f0f',
  legend: { x: 0.01, y: 0.99, font: { color: TEXT }, bgcolor: 'rgba(0,0,0,0.3)' },
  margin: { t: 80, r: 20, b: 20, l: 20 },
  showlegend: true,
  hovermode: 'closest'
};

Plotly.newPlot('chart',
  [traceP, traceT, traceP_start, traceP_end, traceT_start, traceT_end, traceMin],
  layout, { responsive: true, displayModeBar: false }
);
</script>
